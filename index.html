<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gieo Quẻ Sĩ Tử 2K8 - Bản Chân Thực</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Times New Roman", serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: radial-gradient(circle at center, #3a0000, #150000, #000);
            overflow-y: auto;
            color: white;
            padding: 30px 15px;
            position: relative;
        }
        /* Hoa văn đèn lồng treo phong cách cổ trang */
        body::before, body::after {
            content: "🏮";
            position: fixed;
            font-size: 40px;
            top: 20px;
            z-index: 10;
            animation: float 3s ease-in-out infinite alternate;
        }
        body::before { left: 5%; }
        body::after { right: 5%; animation-delay: 1s; }

        @keyframes float {
            0% { transform: translateY(0); }
            100% { transform: translateY(15px); }
        }

        h1 {
            font-size: 38px;
            margin-bottom: 5px;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
            z-index: 2;
            text-align: center;
            letter-spacing: 2px;
        }
        .sub {
            margin-bottom: 40px;
            opacity: .85;
            z-index: 2;
            text-align: center;
            font-style: italic;
            font-size: 16px;
        }

        /* KHU VỰC ỐNG QUẺ CHÂN THỰC DỰNG BẰNG CSS THUẦN */
        .temple {
            position: relative;
            z-index: 2;
            width: 200px;
            height: 280px;
            margin-bottom: 30px;
        }
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,179,0,0.4), transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: blur(15px);
            z-index: -1;
        }
        
        /* Ống xăm bằng gỗ */
        .wood-cup {
            position: absolute;
            bottom: 0;
            left: 25px;
            width: 150px;
            height: 200px;
            background: linear-gradient(90deg, #5c2c16, #8b4513, #a0522d, #5c2c16);
            border-radius: 10px 10px 25px 25px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 10px 25px rgba(0,0,0,0.6);
            border: 3px solid #d4af37;
        }
        /* Hoa văn chữ cổ trên thân ống quẻ */
        .wood-cup::after {
            content: "囍";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #d4af37;
            font-size: 45px;
            opacity: 0.7;
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
        }

        /* Các thanh quẻ tre lấp ló bên trong */
        .sticks-container {
            position: absolute;
            top: 20px;
            left: 45px;
            width: 110px;
            height: 100px;
            transition: 0.3s;
        }
        .stick {
            position: absolute;
            bottom: 0;
            width: 14px;
            height: 140px;
            background: linear-gradient(to bottom, #d2b48c, #cd853f);
            border-radius: 4px 4px 0 0;
            border: 1px solid #8b4513;
            border-bottom: none;
            transform-origin: bottom center;
        }
        /* Xếp các thanh quẻ nghiêng ngẫu nhiên giống thật */
        .stick:nth-child(1) { left: 10px; transform: rotate(-8deg); }
        .stick:nth-child(2) { left: 25px; transform: rotate(-3deg); height: 145px; }
        .stick:nth-child(3) { left: 40px; transform: rotate(5deg); height: 150px; background: #cd853f; }
        .stick:nth-child(4) { left: 55px; transform: rotate(-5deg); height: 142px; }
        .stick:nth-child(5) { left: 70px; transform: rotate(10deg); height: 147px; }
        .stick:nth-child(6) { left: 85px; transform: rotate(2deg); height: 138px; }

        /* Lá quẻ thật rơi ra ngoài */
        .lucky-stick-out {
            position: absolute;
            bottom: 120px;
            left: 85px;
            width: 18px;
            height: 160px;
            background: linear-gradient(to bottom, #e2583e, #b22222);
            border: 1px solid #ffd700;
            border-radius: 5px 5px 0 0;
            z-index: 5;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transform-origin: bottom center;
            animation: jumpOut 0.5s ease-out forwards;
        }
        
        @keyframes jumpOut {
            0% { transform: translateY(20px) rotate(0deg); opacity: 0; }
            100% { transform: translateY(-20px) rotate(15deg); opacity: 1; }
        }

        /* Hiệu ứng rung lắc */
        .shake {
            animation: shakeCup 0.15s infinite alternate;
        }
        @keyframes shakeCup {
            0% { transform: translate(2px, 4px) rotate(-5deg); }
            100% { transform: translate(-2px, -4px) rotate(5deg); }
        }

        /* NÚT BẤM HOÀNG GIA 3D */
        button {
            margin-top: 10px;
            padding: 16px 45px;
            border: 2px solid #ffea85;
            border-radius: 40px;
            background: linear-gradient(180deg, #b22222 0%, #800000 100%);
            color: #ffd700;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            z-index: 2;
            letter-spacing: 1px;
            box-shadow: 0 8px 0 #500000, 0 15px 25px rgba(0, 0, 0, 0.6);
            transition: all 0.1s ease;
            position: relative;
        }
        button:hover {
            background: linear-gradient(180deg, #cb3232 0%, #990000 100%);
            box-shadow: 0 8px 0 #500000, 0 15px 30px rgba(255, 215, 0, 0.2);
        }
        button:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #500000, 0 5px 10px rgba(0, 0, 0, 0.6);
        }
        button:disabled {
            background: #444 !important;
            color: #888 !important;
            border-color: #666 !important;
            box-shadow: 0 4px 0 #222 !important;
            cursor: not-allowed;
            transform: translateY(4px);
        }

        /* GIAO DIỆN LÁ SỚ TRẢ KẾ QUẢ */
        .card {
            display: none;
            margin-top: 35px;
            width: 95%;
            max-width: 600px;
            background: linear-gradient(135deg, #fffcf0, #f6e4b3);
            border: 6px double #8b0000;
            padding: 30px;
            border-radius: 4px;
            color: #222;
            box-shadow: 0 0 35px rgba(255, 215, 0, 0.4), inset 0 0 20px rgba(139,0,0,0.1);
            animation: rollDown 1.2s cubic-bezier(0.1, 1, 0.1, 1);
            z-index: 2;
            position: relative;
        }
        @keyframes rollDown {
            from { opacity: 0; max-height: 0; transform: scaleY(0); }
            to { opacity: 1; max-height: 800px; transform: scaleY(1); }
        }
        .title {
            font-size: 30px;
            color: #b22222;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 2px dashed #b22222;
            padding-bottom: 10px;
            letter-spacing: 1px;
        }
        .content-section {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 15px;
            text-align: justify;
        }
        .luck {
            margin-top: 20px;
            font-weight: bold;
            font-size: 19px;
            color: #006400;
            text-align: center;
        }
        .footer {
            margin-top: 25px;
            font-style: italic;
            color: #444;
            border-top: 1px solid #d4af37;
            padding-top: 12px;
            text-align: center;
            font-size: 15px;
        }
        .history-tag {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            background: #b22222;
            padding: 4px 15px;
            border-radius: 20px;
            font-weight: bold;
            color: #ffd700;
            border: 1px solid #ffd700;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <h1>🏮 GIEO QUẺ SĨ TỬ 2K8 🏮</h1>
    <p class="sub">Thành tâm hướng về phòng thi, nhấn nút xin quẻ nhận sớ cầu may đầu năm.</p>
    
    <div class="temple" id="templeContainer">
        <div class="glow"></div>
        <div class="sticks-container" id="sticksGroup">
            <div class="stick"></div>
            <div class="stick"></div>
            <div class="stick"></div>
            <div class="stick"></div>
            <div class="stick"></div>
            <div class="stick"></div>
        </div>
        <div class="wood-cup"></div>
        <div class="lucky-stick-out" id="luckyStick"></div>
    </div>
    
    <button id="drawBtn" onclick="drawFortune()">🔮 XIN QUẺ ĐỖ ĐẠT</button>
    
    <div id="result" class="card">
        <div id="historyTag" class="history-tag" style="display: none;">Mộc bản quẻ cũ đã lưu</div>
        <div id="title" class="title"></div>
        <div id="content" class="content-section"></div>
        <div id="luck" class="luck"></div>
        <div class="footer">Sĩ tử 2K8 vững bước - Kim bảng đề danh!</div>
    </div>

    <script>
        const fortunes=[
            { title:"🌟 QUẺ ĐẠI CÁT", content:"Những kiến thức bạn đã ôn tập sẽ xuất hiện đúng lúc. Tâm lý vững vàng giúp bạn xử lý tốt cả những câu khó.", luck:"Độ may mắn: 98/100" },
            { title:"🐉 QUẺ CÁ CHÉP HÓA RỒNG", content:"Nỗ lực nhiều tháng qua sắp được đền đáp. Kỳ thi này sẽ là bước ngoặt đáng nhớ.", luck:"Độ may mắn: 95/100" },
            { title:"🏆 QUẺ KIM BẢNG ĐỀ DANH", content:"Con đường đại học đang rộng mở. Hãy tự tin vì bạn đã chuẩn bị tốt hơn mình nghĩ.", luck:"Độ may mắn: 99/100" },
            { title:"🍀 QUẺ THUẬN THIÊN", content:"Ngày thi gặp nhiều điều thuận lợi. Bình tĩnh chính là chìa khóa chiến thắng.", luck:"Độ may mắn: 96/100" },
            { title:"🎯 QUẺ ƯỚC MƠ THÀNH HIỆN THỰC", content:"Bạn đang tiến rất gần mục tiêu của mình. Đừng nghi ngờ bản thân.", luck:"Độ may mắn: 97/100" }
        ];

        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Tiếng lắc quẻ
        function playShakeSound() {
            initAudio();
            let interval = setInterval(() => {
                if (!document.getElementById("templeContainer").classList.contains("shake")) {
                    clearInterval(interval);
                    return;
                }
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(100 + Math.random() * 150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            }, 60);
        }

        // Tiếng chuông ngân
        function playBellSound() {
            initAudio();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);
        }

        window.onload = function() {
            const savedFortune = localStorage.getItem("situ2k7_fortune");
            if (savedFortune) {
                const q = JSON.parse(savedFortune);
                showResult(q);
                document.getElementById("historyTag").style.display = "block";
            }
        }

        function showResult(q) {
            document.getElementById("title").innerHTML = q.title;
            document.getElementById("content").innerHTML = q.content;
            document.getElementById("luck").innerHTML = q.luck;
            document.getElementById("result").style.display = "block";
        }

        function drawFortune(){
            initAudio();
            const box = document.getElementById("templeContainer");
            const result = document.getElementById("result");
            const btn = document.getElementById("drawBtn");
            const historyTag = document.getElementById("historyTag");
            const luckyStick = document.getElementById("luckyStick");
            
            result.style.display = "none";
            historyTag.style.display = "none";
            luckyStick.style.display = "none";
            btn.disabled = true; 
            
            box.classList.add("shake");
            playShakeSound(); 
            
            setTimeout(()=>{
                box.classList.remove("shake");
                playBellSound(); 
                
                // Hiển thị thanh quẻ rơi ra
                luckyStick.style.display = "block";
                
                let q = fortunes[ Math.floor( Math.random()*fortunes.length ) ];
                localStorage.setItem("situ2k7_fortune", JSON.stringify(q));
                
                // Trì hoãn hiển thị sớ 1 chút sau khi quẻ rơi để tạo cảm giác chân thực
                setTimeout(() => {
                    showResult(q);
                    btn.disabled = false; 
                }, 400);
                
            }, 2000); // Rung lắc trong 2 giây là vừa vặn
        }
    </script>
</body>
  </html>
