<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gieo Quẻ Mùa Thi - Bản Hoàng Gia Cổ Phong</title>
    <style>
        /* --- ĐỊNH DẠNG CHUNG --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Times New Roman", serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: radial-gradient(circle at center, #2c0000 0%, #120000 70%, #050000 100%);
            overflow-x: hidden;
            overflow-y: auto;
            color: white;
            padding: 40px 15px;
            position: relative;
        }

        /* --- HIỆU ỨNG LÁ RƠI (HỒNG HOA) --- */
        .petal {
            position: fixed;
            background: #b22222;
            border-radius: 150% 0 150% 50%;
            opacity: 0.3;
            pointer-events: none;
            z-index: 1;
            animation: fadeFall linear infinite;
        }
        @keyframes fadeFall {
            0% { transform: translate(0, -10px) rotate(0deg); opacity: 0.6; }
            100% { transform: translate(100px, 100vh) rotate(360deg); opacity: 0; }
        }

        /* Họa văn đèn lồng hoàng cung */
        body::before, body::after {
            content: "🏮";
            position: fixed;
            font-size: 45px;
            top: 20px;
            z-index: 10;
            filter: drop-shadow(0 0 10px #ffd700);
            animation: swing 3s ease-in-out infinite alternate;
        }
        body::before { left: 6%; transform-origin: top center; }
        body::after { right: 6%; animation-delay: 1s; transform-origin: top center; }

        @keyframes swing {
            0% { transform: rotate(-5deg) translateY(0); }
            100% { transform: rotate(5deg) translateY(10px); }
        }

        /* --- TIÊU ĐỀ --- */
        h1 {
            font-size: 42px;
            margin-bottom: 8px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 0 0 40px rgba(255, 69, 0, 0.5);
            z-index: 2;
            text-align: center;
            letter-spacing: 4px;
            font-weight: 900;
        }
        .sub {
            margin-bottom: 45px;
            opacity: .9;
            color: #ffea85;
            z-index: 2;
            text-align: center;
            font-style: italic;
            font-size: 18px;
            max-width: 500px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* --- ỐNG QUẺ THUẦN CSS NÂNG CẤP --- */
        .temple {
            position: relative;
            z-index: 2;
            width: 220px;
            height: 300px;
            margin-bottom: 35px;
        }
        .glow {
            position: absolute;
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, rgba(255,140,0,0.35), transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: blur(20px);
            z-index: -1;
        }
        .wood-cup {
            position: absolute;
            bottom: 0;
            left: 30px;
            width: 160px;
            height: 210px;
            background: linear-gradient(90deg, #421c0e, #703311, #8b4513, #421c0e);
            border-radius: 12px 12px 30px 30px;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.9), 0 12px 30px rgba(0,0,0,0.7);
            border: 4px solid #d4af37;
        }
        .wood-cup::after {
            content: "功名";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #d4af37;
            font-size: 32px;
            font-weight: bold;
            opacity: 0.75;
            letter-spacing: 5px;
            writing-mode: vertical-rl;
            text-shadow: 0 0 12px rgba(255,215,0,0.6);
        }

        /* Các thanh quẻ tre lấp ló */
        .sticks-container {
            position: absolute;
            top: 15px;
            left: 55px;
            width: 110px;
            height: 100px;
            transition: 0.3s;
        }
        .stick {
            position: absolute;
            bottom: 0;
            width: 14px;
            height: 150px;
            background: linear-gradient(to bottom, #deb887, #b8860b);
            border-radius: 5px 5px 0 0;
            border: 1px solid #5c2c16;
            border-bottom: none;
            transform-origin: bottom center;
        }
        .stick:nth-child(1) { left: 5px; transform: rotate(-12deg); }
        .stick:nth-child(2) { left: 20px; transform: rotate(-6deg); height: 155px; }
        .stick:nth-child(3) { left: 35px; transform: rotate(2deg); height: 160px; background: #cd853f; }
        .stick:nth-child(4) { left: 50px; transform: rotate(-3deg); height: 152px; }
        .stick:nth-child(5) { left: 65px; transform: rotate(8deg); height: 157px; }
        .stick:nth-child(6) { left: 80px; transform: rotate(14deg); height: 148px; }

        /* Lá quẻ văng ra ngoài */
        .lucky-stick-out {
            position: absolute;
            bottom: 130px;
            left: 95px;
            width: 20px;
            height: 170px;
            background: linear-gradient(to bottom, #d63031, #8b0000);
            border: 2px solid #ffd700;
            border-radius: 6px 6px 0 0;
            z-index: 5;
            display: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            transform-origin: bottom center;
            animation: jumpOut 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes jumpOut {
            0% { transform: translateY(40px) rotate(0deg); opacity: 0; }
            60% { transform: translateY(-40px) rotate(-10deg); opacity: 1; }
            100% { transform: translateY(-25px) rotate(18deg); opacity: 1; }
        }

        /* Rung lắc ống quẻ */
        .shake { animation: shakeCup 0.12s infinite alternate; }
        @keyframes shakeCup {
            0% { transform: translate(3px, 5px) rotate(-6deg); }
            100% { transform: translate(-3px, -5px) rotate(6deg); }
        }

        /* --- NÚT BẤM 3D HOÀNG GIA --- */
        button {
            margin-top: 15px;
            padding: 18px 50px;
            border: 2px solid #fff5c0;
            border-radius: 50px;
            background: linear-gradient(180deg, #d63031 0%, #7f0000 100%);
            color: #ffd700;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            z-index: 2;
            letter-spacing: 2px;
            box-shadow: 0 9px 0 #4a0000, 0 15px 30px rgba(0, 0, 0, 0.7);
            transition: all 0.1s ease;
        }
        button:hover {
            background: linear-gradient(180deg, #ff4757 0%, #b22222 100%);
            box-shadow: 0 9px 0 #4a0000, 0 15px 35px rgba(255, 215, 0, 0.25);
        }
        button:active {
            transform: translateY(7px);
            box-shadow: 0 2px 0 #4a0000, 0 5px 15px rgba(0, 0, 0, 0.7);
        }
        button:disabled {
            background: #333 !important;
            color: #666 !important;
            border-color: #555 !important;
            box-shadow: 0 4px 0 #111 !important;
            cursor: not-allowed;
            transform: translateY(5px);
        }

        /* --- LÁ SỚ TRẢ KẾ QUẢ --- */
        .card {
            display: none;
            margin-top: 40px;
            width: 100%;
            max-width: 550px;
            background: linear-gradient(135deg, #fffdf3 0%, #f4e2aa 100%);
            border: 5px double #8b0000;
            outline: 2px solid #ffd700;
            outline-offset: -12px;
            padding: 40px 35px;
            border-radius: 4px;
            color: #111;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.5), inset 0 0 30px rgba(139,0,0,0.15);
            animation: rollDown 1s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
            z-index: 2;
            position: relative;
        }
        @keyframes rollDown {
            from { opacity: 0; transform: scaleY(0.7) translateY(-30px); }
            to { opacity: 1; transform: scaleY(1) translateY(0); }
        }
        .title {
            font-size: 32px;
            color: #b22222;
            font-weight: bold;
            margin-bottom: 25px;
            text-align: center;
            border-bottom: 3px double #b22222;
            padding-bottom: 12px;
            letter-spacing: 2px;
        }
        .content-section {
            font-size: 19px;
            line-height: 1.7;
            margin-bottom: 20px;
            text-align: justify;
            font-weight: 500;
        }
        .luck {
            margin-top: 25px;
            font-weight: bold;
            font-size: 21px;
            color: #006400;
            text-align: center;
            background: rgba(0, 100, 0, 0.08);
            padding: 8px;
            border-radius: 5px;
            border: 1px dashed rgba(0, 100, 0, 0.3);
        }
        .footer {
            margin-top: 30px;
            font-style: italic;
            color: #333;
            border-top: 1px dashed #b22222;
            padding-top: 15px;
            text-align: center;
            font-size: 16px;
            letter-spacing: 1px;
        }
        .history-tag {
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            background: #b22222;
            padding: 5px 20px;
            border-radius: 20px;
            font-weight: bold;
            color: #ffd700;
            border: 1px solid #ffd700;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <h1>🏮 GIEO QUẺ MÙA THI 🏮</h1>
    <p class="sub">Vạn sự tùy duyên, tâm thành tắc linh. Hãy bình tâm tiến về phía trước, bảng vàng khắc tên!</p>
    
    <div class="temple" id="templeContainer">
        <div class="glow"></div>
        <div class="sticks-container" id="sticksGroup">
            <div class="stick"></div>
            <div class="stick"></div>
            <div class="stick"></div>
            <div class="stick"></div>
            <div class="stick"></div>
            <div class="stick"></div>
        </div>
        <div class="wood-cup"></div>
        <div class="lucky-stick-out" id="luckyStick"></div>
    </div>
    
    <button id="drawBtn" onclick="drawFortune()">🔮 XIN QUẺ ĐỖ ĐẠT</button>
    
    <div id="result" class="card">
        <div id="historyTag" class="history-tag" style="display: none;">MỘC BẢN QUẺ CŨ ĐÃ LƯU</div>
        <div id="title" class="title"></div>
        <div id="content" class="content-section"></div>
        <div id="luck" class="luck"></div>
        <div class="footer">Sĩ tử vững bước - Kim bảng đề danh!</div>
    </div>

    <script>
        // --- DANH SÁCH 20 QUẺ BÓI MÙA THI ---
        const fortunes = [
            { title: "🌟 QUẺ SỐ 1: ĐẠI CÁT ĐẠI LỢI", content: "Vận thế hanh thông, thần trí sáng suốt lạ thường. Bước vào phòng thi như có quý nhân trợ giúp, gặp câu hỏi quen, trúng tủ tuyệt đối. Chỉ cần không chủ quan, thủ khoa đang gọi tên bạn.", luck: "Độ may mắn: 99/100" },
            { title: "🐉 QUẺ SỐ 2: CÁ CHÉP HÓA RỒNG", content: "Thời cơ chín muồi, mười năm đèn sách khổ luyện sắp đến ngày gặt hái quả ngọt. Kỳ thi này chính là bệ phóng lớn giúp bạn thay đổi vận mệnh, danh tiếng vang xa.", luck: "Độ may mắn: 97/100" },
            { title: "🏆 QUẺ SỐ 3: KIM BẢNG ĐỀ DANH", content: "Điềm báo tên bạn chắc chắn sẽ được khắc trên bảng vàng đại học. Trực giác nhạy bén, tính toán chuẩn xác từng con số, lập luận chặt chẽ trong từng câu văn.", luck: "Độ may mắn: 98/100" },
            { title: "🍀 QUẺ SỐ 4: THUẬN THIÊN HÀNH ĐẠO", content: "Thi cử thuận lợi, thời tiết ôn hòa ủng hộ lòng người. Tinh thần thoải mái giúp bạn phát huy được 200% năng lực vốn có. Cứ bình tĩnh, vinh quang thuộc về bạn.", luck: "Độ may mắn: 95/100" },
            { title: "🎯 QUẺ SỐ 5: SỬ ĐÁM TOÀN THẮNG", content: "Bút sa gà chết nhưng bút của bạn sa đến đâu là điểm mười đến đó. Khả năng phân tích đỉnh cao, giám thị dễ tính, phòng thi nghiêm túc giúp bạn tập trung tối đa.", luck: "Độ may mắn: 96/100" },
            { title: "🦅 QUẺ SỐ 6: ĐẠI BÀNG TUNG CÁNH", content: "Không còn điều gì có thể cản bước chân bạn nữa. Đề thi có khó cũng chỉ là đá lót đường cho phượng hoàng cất cánh. Hãy tự tin chọn đáp án đầu tiên bạn nghĩ đến.", luck: "Độ may mắn: 94/100" },
            { title: "🌞 QUẺ SỐ 7: KHAI MAU ĐÀO LÝ", content: "Giống như hoa đào mùa xuân nở rộ, kiến thức tích lũy bấy lâu nay sẽ tuôn trào dưới ngòi bút của bạn. Gặp dữ hóa lành, gặp câu hiểm hóc lại đột nhiên tìm ra manh mối.", luck: "Độ may mắn: 93/100" },
            { title: "🔮 QUẺ SỐ 8: THẦN CƠ DIỆU TOÁN", content: "Quẻ chủ về tính toán. Các sĩ tử khối A, A1, B sẽ như cá gặp nước. Khả năng nhẩm nghiệm nhanh, nhớ công thức chính xác đến từng dấu phẩy.", luck: "Độ may mắn: 95/100" },
            { title: "📜 QUẺ SỐ 9: VĂN CHƯƠNG HOA MỸ", content: "Quẻ đặc biệt có lợi cho các môn tự luận và xã hội. Ý văn dạt dào, lập luận sắc bén khiến người chấm điểm phải gật gù thán phục. Điểm số sẽ vượt xa kỳ vọng.", luck: "Độ may mắn: 92/100" },
            { title: "🦁 QUẺ SỐ 10: MÃNH HỔ XUẤT SƠN", content: "Khí thế hừng hực, tâm lý chiến vững như bàn thạch. Tiếng trống trường không làm bạn run sợ mà càng kích thích sự quyết tâm. Một mình một ngựa phá đảo phòng thi.", luck: "Độ may mắn: 96/100" },
            { title: "💎 QUẺ SỐ 11: NGỌC SÁNG TRONG ĐÁ", content: "Có thể năng lực của bạn ngày thường chưa nổi bật, nhưng đúng ngày thi viên ngọc quý mới phát sáng. Bạn sẽ tạo nên một cú lội ngược dòng ngoạn mục khiến ai cũng trầm trồ.", luck: "Độ may mắn: 91/100" },
            { title: "🌊 QUẺ SỐ 12: THỦY ĐÁO THÀNH CÔNG", content: "Nước chảy thành sông, mọi chuyện diễn ra tự nhiên và suôn sẻ. Không cần quá gượng ép, những gì bạn học được sẽ tự động tái hiện rõ mồn một trong tâm trí.", luck: "Độ may mắn: 90/100" },
            { title: "🌟 QUẺ SỐ 13: BÁCH TRÚNG BÁCH THẮNG", content: "Quẻ cực tốt cho việc khoanh trắc nghiệm. Những câu không chắc chắn, trực giác sẽ dẫn lối bạn đến với đáp án chính xác. Hãy tin vào lựa chọn của bản thân.", luck: "Độ may mắn: 94/100" },
            { title: "🏰 QUẺ SỐ 14: TOÀN GIA HỶ SỰ", content: "Kỳ thi này không chỉ mang lại vinh quang cho riêng bạn mà còn mang về niềm vui lớn cho gia đình. Hãy nghĩ về nụ cười của cha mẹ để có thêm động lực làm bài thật tốt.", luck: "Độ may mắn: 93/100" },
            { title: "⚖️ QUẺ SỐ 15: CẨN TẮC VÔ ƯU", content: "Quẻ trung cát, may mắn ở mức khá nhưng điểm số phụ thuộc lớn vào sự cẩn thận. Hãy rà soát lại bài làm ít nhất hai lần để tránh những lỗi sai ngớ ngẩn, mất điểm oan.", luck: "Độ may mắn: 85/100" },
            { title: "🕯️ QUẺ SỐ 16: KHỔ TẬN CAM LAI", content: "Chuỗi ngày thức khuya dậy sớm, mệt mỏi áp lực chuẩn bị kết thúc bằng một kết quả mỹ mãn. Điểm số hoàn toàn xứng đáng với mồ hôi và nước mắt bạn đã bỏ ra.", luck: "Độ may mắn: 89/100" },
            { title: "🧭 QUẺ SỐ 17: MINH SƯ CHỈ LỐI", content: "Bạn sẽ gặp may mắn nhờ những lời dặn dò, lưu ý cuối cùng của thầy cô giáo trước khi thi. Hãy nhớ lại các mẹo làm bài đã được học, chúng chính là chìa khóa cứu cánh.", luck: "Độ may mắn: 88/100" },
            { title: "🛡️ QUẺ SỐ 18: BÌNH AN VÔ SỰ", content: "Không có biến cố, không có sai sót. Sức khỏe dồi dào, tâm lý ổn định suốt các buổi thi. Điểm số phản ánh đúng và đủ năng lực thực tế của bạn, đạt nguyện vọng mong muốn.", luck: "Độ may mắn: 87/100" },
            { title: "🚀 QUẺ SỐ 19: THỜI LAI THẦN TRỢ", content: "Vận khí đang lên như diều gặp gió. Những phần kiến thức bạn mới xem qua vào tối hôm trước rất có thể sẽ xuất hiện ngay trong tờ đề thi sáng hôm sau. Quá tuyệt vời!", luck: "Độ may mắn: 95/100" },
            { title: "🌌 QUẺ SỐ 20: TỰ CƯỜNG BẤT TỨC", content: "Trời giúp người tự giúp mình. May mắn lớn nhất của bạn chính là sự kiên trì vô hạn. Hãy giữ vững cái đầu lạnh và trái tim nóng, trường đại học mơ ước đã ở rất gần.", luck: "Độ may mắn: 91/100" }
        ];

        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Tiếng lắc quẻ
        function playShakeSound() {
            initAudio();
            let interval = setInterval(() => {
                if (!document.getElementById("templeContainer").classList.contains("shake")) {
                    clearInterval(interval);
                    return;
                }
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(120 + Math.random() * 180, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.04);
            }, 50);
        }

        // Tiếng chuông ngân cổ phong
        function playBellSound() {
            initAudio();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime); // Nốt Mi ngân vang
            gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.0);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 2.0);
        }

        // --- HIỆU ỨNG TẠO LÁ RƠI TỰ ĐỘNG ---
        function createPetals() {
            for (let i = 0; i < 25; i++) {
                let petal = document.createElement('div');
                petal.classList.add('petal');
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.top = Math.random() * -20 + 'vh';
                petal.style.width = Math.random() * 10 + 8 + 'px';
                petal.style.height = Math.random() * 10 + 8 + 'px';
                petal.style.animationDuration = Math.random() * 4 + 4 + 's';
                petal.style.animationDelay = Math.random() * 5 + 's';
                document.body.appendChild(petal);
            }
        }

        window.onload = function() {
            createPetals();
            const savedFortune = localStorage.getItem("situ2k7_fortune");
            if (savedFortune) {
                try {
                    const q = JSON.parse(savedFortune);
                    showResult(q);
                    document.getElementById("historyTag").style.display = "block";
                } catch(e) {
                    localStorage.removeItem("situ2k7_fortune");
                }
            }
        }

        function showResult(q) {
            document.getElementById("title").innerHTML = q.title;
            document.getElementById("content").innerHTML = q.content;
            document.getElementById("luck").innerHTML = q.luck;
            document.getElementById("result").style.display = "block";
        }

        function drawFortune(){
            initAudio();
            const box = document.getElementById("templeContainer");
            const result = document.getElementById("result");
            const btn = document.getElementById("drawBtn");
            const historyTag = document.getElementById("historyTag");
            const luckyStick = document.getElementById("luckyStick");
            
            result.style.display = "none";
            historyTag.style.display = "none";
            luckyStick.style.display = "none";
            btn.disabled = true; 
            
            box.classList.add("shake");
            playShakeSound(); 
            
            setTimeout(()=>{
                box.classList.remove("shake");
                playBellSound(); 
                
                luckyStick.style.display = "block";
                
                // Thuật toán chọn quẻ ngẫu nhiên hoàn toàn từ 20 quẻ
                let q = fortunes[ Math.floor( Math.random() * fortunes.length ) ];
                localStorage.setItem("situ2k7_fortune", JSON.stringify(q));
                
                setTimeout(() => {
                    showResult(q);
                    btn.disabled = false; 
                }, 500);
                
            }, 2000);
        }
    </script>
</body>
</html>
